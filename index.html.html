<!DOCTYPE html>
<html lang="ua">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title >Мій сайт</title></title>

    <style>
        body {  
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background-color: #f2f2f2;
            font-family:#0056b3;
        }

        h1 {
             font-size: 50px;
             margin-bottom: 20px;
        }

        button {
            padding: 15px 35px;;
            font-size: 20px;
            border: none;
т            border-radius: 10px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <h1>Вітаємо на моему сайті</h1>

    <button>Нажми на мене</button>

</body>
